<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{base :: header('Thông tin cá nhân')}"></head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-rose-100 min-h-screen flex flex-col font-sans">

    <!-- Header / Navbar -->
    <nav th:replace="~{base :: navbar}"></nav>

    <!-- Main Content -->
    <div class="flex-1 max-w-4xl mx-auto w-full px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Left panel - User card -->
        <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-md p-6 border border-white/40 h-fit text-center">
            <div class="w-24 h-24 bg-gradient-to-tr from-orange-400 to-amber-400 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold shadow-md">
                <i class="fa-solid fa-user"></i>
            </div>
            <h3 class="mt-4 text-xl font-bold text-gray-800" th:text="${user.fullName ?: user.username}"></h3>
            <p class="text-xs text-gray-500 font-medium uppercase tracking-wider mt-1" th:text="${user.role}"></p>
            <div class="mt-6 border-t border-gray-100 pt-4 text-left space-y-3">
                <div class="flex items-center gap-2.5 text-sm text-gray-600">
                    <i class="fa-solid fa-phone text-orange-500 w-5"></i>
                    <span th:text="${user.phone ?: 'Chưa cập nhật'}"></span>
                </div>
                <div class="flex items-center gap-2.5 text-sm text-gray-600">
                    <i class="fa-solid fa-envelope text-orange-500 w-5"></i>
                    <span th:text="${user.email ?: 'Chưa cập nhật'}"></span>
                </div>
                <div class="flex items-center gap-2.5 text-sm text-gray-600">
                    <i class="fa-solid fa-location-dot text-orange-500 w-5"></i>
                    <span class="truncate" th:text="${user.address ?: 'Chưa cập nhật'}"></span>
                </div>
            </div>
        </div>

        <!-- Right panel - Edit profile & Change password -->
        <div class="md:col-span-2 space-y-6">
            
            <!-- Notification -->
            <div th:if="${success != null}" class="bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg flex items-center gap-3">
                <i class="fa-solid fa-circle-check text-green-500 text-lg"></i>
                <span class="text-sm font-medium text-green-700" th:text="${success}"></span>
            </div>
            <div th:if="${error != null}" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation text-red-500 text-lg"></i>
                <span class="text-sm font-medium text-red-700" th:text="${error}"></span>
            </div>

            <!-- Form 1: Edit Profile -->
            <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-md p-6 border border-white/40">
                <h4 class="text-lg font-bold text-gray-800 border-b border-gray-100 pb-3 mb-4">
                    <i class="fa-solid fa-user-pen text-orange-500 mr-1.5"></i> Cập nhật hồ sơ
                </h4>
                <form id="profileForm" th:action="@{/user/profile/update}" method="POST" class="space-y-4" novalidate>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-1">Họ và tên <span class="text-red-500">*</span></label>
                            <input type="text" id="fullName" name="fullName" th:value="${user.fullName}"
                                   class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200">
                            <p id="fullName-error" class="hidden mt-1 text-xs text-red-600 font-medium">Họ và tên không được để trống!</p>
                        </div>
                        <div>
                            <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">Số điện thoại <span class="text-red-500">*</span></label>
                            <input type="tel" id="phone" name="phone" th:value="${user.phone}" maxlength="11"
                                   class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200">
                            <p id="phone-error" class="hidden mt-1 text-xs text-red-600 font-medium">Số điện thoại không hợp lệ!</p>
                        </div>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" name="email" th:value="${user.email}"
                               class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200">
                        <p id="email-error" class="hidden mt-1 text-xs text-red-600 font-medium">Email không đúng định dạng!</p>
                    </div>
                    <div>
                        <label for="address" class="block text-sm font-semibold text-gray-700 mb-1">Địa chỉ</label>
                        <textarea id="address" name="address" rows="2" th:text="${user.address}"
                                  class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200 resize-none"></textarea>
                    </div>
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all duration-200">
                        Lưu thông tin
                    </button>
                </form>
            </div>

            <!-- Notification for Password -->
            <div th:if="${successPass != null}" class="bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg flex items-center gap-3">
                <i class="fa-solid fa-circle-check text-green-500 text-lg"></i>
                <span class="text-sm font-medium text-green-700" th:text="${successPass}"></span>
            </div>
            <div th:if="${errorPass != null}" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation text-red-500 text-lg"></i>
                <span class="text-sm font-medium text-red-700" th:text="${errorPass}"></span>
            </div>

            <!-- Form 2: Change Password -->
            <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-md p-6 border border-white/40">
                <h4 class="text-lg font-bold text-gray-800 border-b border-gray-100 pb-3 mb-4">
                    <i class="fa-solid fa-key text-orange-500 mr-1.5"></i> Đổi mật khẩu
                </h4>
                <form id="passwordForm" th:action="@{/user/profile/change-password}" method="POST" class="space-y-4" novalidate>
                    <div>
                        <label for="oldPassword" class="block text-sm font-semibold text-gray-700 mb-1">Mật khẩu cũ <span class="text-red-500">*</span></label>
                        <input type="password" id="oldPassword" name="oldPassword"
                               class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200">
                        <p id="oldPassword-error" class="hidden mt-1 text-xs text-red-600 font-medium">Vui lòng nhập mật khẩu cũ!</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="newPassword" class="block text-sm font-semibold text-gray-700 mb-1">Mật khẩu mới <span class="text-red-500">*</span></label>
                            <input type="password" id="newPassword" name="newPassword"
                                   class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200">
                            <p id="newPassword-error" class="hidden mt-1 text-xs text-red-600 font-medium">Mật khẩu mới ít nhất 4 ký tự!</p>
                        </div>
                        <div>
                            <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-1">Xác nhận mật khẩu mới <span class="text-red-500">*</span></label>
                            <input type="password" id="confirmPassword" name="confirmPassword"
                                   class="block w-full rounded-xl border border-gray-200 py-2.5 px-3.5 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all duration-200">
                            <p id="confirmPassword-error" class="hidden mt-1 text-xs text-red-600 font-medium">Xác nhận mật khẩu không khớp!</p>
                        </div>
                    </div>
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all duration-200">
                        Đổi mật khẩu
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        function getEl(id) { return document.getElementById(id); }
        function getErr(id) { return getEl(id + '-error'); }

        function showError(id, msg) {
            const input = getEl(id);
            const err = getErr(id);
            if (input && err) {
                err.textContent = msg;
                err.classList.remove('hidden');
                input.classList.add('border-red-400');
                input.classList.remove('border-gray-200');
            }
        }

        function clearError(id) {
            const input = getEl(id);
            const err = getErr(id);
            if (input && err) {
                err.classList.add('hidden');
                input.classList.remove('border-red-400');
                input.classList.add('border-gray-200');
            }
        }

        // Validate Profile Form
        const profileForm = getEl('profileForm');
        profileForm.addEventListener('submit', function(e) {
            let valid = true;

            const name = getEl('fullName').value.trim();
            if (!name) {
                showError('fullName', 'Họ và tên không được để trống!');
                valid = false;
            } else {
                clearError('fullName');
            }

            const phone = getEl('phone').value.trim();
            if (!phone) {
                showError('phone', 'Số điện thoại không được để trống!');
                valid = false;
            } else if (!/^\d{10,11}$/.test(phone)) {
                showError('phone', 'Số điện thoại phải gồm 10-11 chữ số!');
                valid = false;
            } else {
                clearError('phone');
            }

            const email = getEl('email').value.trim();
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('email', 'Email không đúng định dạng!');
                valid = false;
            } else {
                clearError('email');
            }

            if (!valid) {
                e.preventDefault();
            }
        });

        // Realtime validation clear for Profile
        ['fullName', 'phone', 'email'].forEach(id => {
            getEl(id).addEventListener('input', () => clearError(id));
        });

        // Phone numbers only format
        getEl('phone').addEventListener('input', function() {
            this.value = this.value.replace(/[^\d]/g, '');
        });

        // Validate Password Form
        const passwordForm = getEl('passwordForm');
        passwordForm.addEventListener('submit', function(e) {
            let valid = true;

            const oldPass = getEl('oldPassword').value;
            if (!oldPass) {
                showError('oldPassword', 'Vui lòng nhập mật khẩu cũ!');
                valid = false;
            } else {
                clearError('oldPassword');
            }

            const newPass = getEl('newPassword').value;
            if (!newPass) {
                showError('newPassword', 'Mật khẩu mới không được để trống!');
                valid = false;
            } else if (newPass.length < 4) {
                showError('newPassword', 'Mật khẩu mới phải có ít nhất 4 ký tự!');
                valid = false;
            } else {
                clearError('newPassword');
            }

            const confirmPass = getEl('confirmPassword').value;
            if (!confirmPass) {
                showError('confirmPassword', 'Vui lòng xác nhận mật khẩu!');
                valid = false;
            } else if (confirmPass !== newPass) {
                showError('confirmPassword', 'Xác nhận mật khẩu không khớp!');
                valid = false;
            } else {
                clearError('confirmPassword');
            }

            if (!valid) {
                e.preventDefault();
            }
        });

        ['oldPassword', 'newPassword', 'confirmPassword'].forEach(id => {
            getEl(id).addEventListener('input', () => clearError(id));
        });
    </script>
</body>
</html>
