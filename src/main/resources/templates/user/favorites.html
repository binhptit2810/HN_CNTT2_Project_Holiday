<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{base :: header('Món ăn yêu thích')}"></head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-rose-100 min-h-screen flex flex-col font-sans">

    <!-- Header / Navbar -->
    <nav th:replace="~{base :: navbar}"></nav>

    <!-- Main Content Container -->
    <div class="flex-1 max-w-7xl mx-auto w-full px-4 py-8 space-y-6">
        
        <div class="flex justify-between items-center bg-white/60 backdrop-blur rounded-2xl p-4 border border-white/20">
            <div>
                <h1 class="text-xl font-bold text-gray-800">Danh sách yêu thích của bạn</h1>
                <p class="text-xs text-gray-400 mt-0.5">Những món ăn ngon mà bạn yêu thích và lưu lại</p>
            </div>
            <span class="text-sm font-bold text-gray-500" th:text="${menuItems.size()} + ' món'"></span>
        </div>

        <!-- Empty state -->
        <div th:if="${menuItems.isEmpty()}" class="bg-white/80 backdrop-blur-md rounded-2xl p-12 text-center border border-white/40 max-w-md mx-auto space-y-4">
            <div class="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center text-rose-500 text-2xl mx-auto">
                <i class="fa-regular fa-heart"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800 text-base">Chưa có món yêu thích nào</h3>
                <p class="text-xs text-gray-400 mt-1">Khám phá thực đơn và lưu lại các món ăn bạn thích bằng cách ấn vào biểu tượng trái tim.</p>
            </div>
            <a href="/user/menu" class="inline-block bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-xl text-xs shadow-md transition-colors">
                Xem thực đơn ngay
            </a>
        </div>

        <!-- Favorites Grid -->
        <div th:if="${!menuItems.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div th:each="item : ${menuItems}" th:id="'fav-card-' + ${item.id}"
                 class="bg-white rounded-2xl shadow-sm hover:shadow-md border border-gray-100 overflow-hidden flex flex-col group transition-all duration-200">
                
                <!-- Image Area -->
                <div class="relative h-40 w-full bg-slate-100 overflow-hidden">
                    <img th:src="${item.imageUrl != null && item.imageUrl != '' ? item.imageUrl : 'https://placehold.co/600x400?text=Food'}" th:alt="${item.name}"
                         onerror="this.src='https://placehold.co/600x400?text=No+Image+Available'"
                         class="h-full w-full object-cover group-hover:scale-105 transition-transform duration-300">
                    
                    <!-- Remove Favorite Heart Button -->
                    <button type="button" th:attr="data-id=${item.id}" onclick="removeFavorite(this)"
                            class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/90 shadow-sm flex items-center justify-center text-sm transition-transform hover:scale-110 active:scale-95 text-rose-500">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>

                <!-- Details -->
                <div class="p-4 flex-1 flex flex-col gap-1.5">
                    <div class="flex justify-between items-start gap-2">
                        <h4 class="font-bold text-gray-800 text-sm group-hover:text-orange-500 transition-colors" th:text="${item.name}"></h4>
                    </div>
                    <p class="text-xs text-gray-400 line-clamp-2" th:text="${item.description ?: 'Không có mô tả cho món ăn này.'}"></p>
                    <div class="mt-auto pt-3 flex justify-between items-center border-t border-gray-50">
                        <span class="text-sm font-black text-gray-900" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        
                        <!-- Add to Cart trigger -->
                        <button type="button" th:disabled="${item.status.name() != 'AVAILABLE'}"
                                th:attr="data-id=${item.id}, data-name=${item.name}" onclick="openAddToCartModal(this)"
                                class="bg-orange-500 hover:bg-orange-600 disabled:bg-gray-200 disabled:cursor-not-allowed text-white font-bold py-1.5 px-3 rounded-lg text-xs flex items-center gap-1 transition-colors">
                            <i class="fa-solid fa-cart-plus"></i> Thêm giỏ
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Add Item with note -->
    <div id="addToCartModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl border border-gray-100 transform scale-95 transition-transform duration-200">
            <h4 class="text-lg font-bold text-gray-800" id="modalFoodName">Món ăn</h4>
            <p class="text-xs text-gray-400 mt-0.5">Thêm sản phẩm này vào giỏ hàng của bạn</p>
            
            <div class="mt-4 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Số lượng</label>
                    <div class="flex items-center gap-3">
                        <button type="button" onclick="adjustModalQty(-1)" class="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 font-bold flex items-center justify-center transition-colors">-</button>
                        <input type="number" id="modalQty" value="1" min="1" readonly class="w-12 text-center font-bold outline-none text-sm">
                        <button type="button" onclick="adjustModalQty(1)" class="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 font-bold flex items-center justify-center transition-colors">+</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ghi chú món ăn</label>
                    <textarea id="modalNote" rows="2" placeholder="Ví dụ: Ít cay, không hành..."
                              class="w-full rounded-xl border border-gray-200 py-2 px-3 text-xs outline-none focus:border-orange-500 transition-colors resize-none"></textarea>
                </div>
            </div>

            <div class="flex gap-2.5 mt-5">
                <button type="button" onclick="closeAddToCartModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2 px-4 rounded-xl text-xs transition-colors">Huỷ</button>
                <button type="button" id="modalSubmitBtn" onclick="submitAddToCart()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-xl text-xs shadow-md transition-colors flex items-center justify-center gap-1">
                    <i class="fa-solid fa-check"></i> Xác nhận
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white text-xs font-bold py-3 px-5 rounded-xl shadow-lg flex items-center gap-2 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <span id="toastIcon"></span>
        <span id="toastMsg">Tin nhắn</span>
    </div>

    <script>
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const message = document.getElementById('toastMsg');

            message.textContent = msg;
            if (type === 'success') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-400 text-base"></i>';
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-exclamation text-rose-400 text-base"></i>';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Remove favorite with DOM update
        function removeFavorite(btn) {
            const menuItemId = btn.getAttribute('data-id');
            btn.style.pointerEvents = 'none';

            const params = new URLSearchParams();
            params.append('menuItemId', menuItemId);

            fetch('/user/favorites/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(res => res.json())
            .then(data => {
                btn.style.pointerEvents = 'auto';
                if (data.success) {
                    showToast('Đã bỏ món ăn khỏi danh sách yêu thích!', 'success');
                    // Remove card from DOM
                    const card = document.getElementById('fav-card-' + menuItemId);
                    if (card) {
                        card.classList.add('scale-90', 'opacity-0');
                        setTimeout(() => {
                            card.remove();
                            // Reload page if empty to show empty state
                            if (document.querySelectorAll('[id^="fav-card-"]').length === 0) {
                                window.location.reload();
                            }
                        }, 250);
                    }
                } else {
                    showToast(data.message, 'error');
                }
            })
            .catch(err => {
                btn.style.pointerEvents = 'auto';
                showToast('Kết nối thất bại!', 'error');
            });
        }

        // Add to Cart modal helpers
        let activeMenuItemId = null;

        function openAddToCartModal(btn) {
            activeMenuItemId = btn.getAttribute('data-id');
            const foodName = btn.getAttribute('data-name');
            
            document.getElementById('modalFoodName').textContent = foodName;
            document.getElementById('modalQty').value = 1;
            document.getElementById('modalNote').value = '';

            const modal = document.getElementById('addToCartModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 20);
        }

        function closeAddToCartModal() {
            const modal = document.getElementById('addToCartModal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                activeMenuItemId = null;
            }, 200);
        }

        function adjustModalQty(val) {
            const qtyInput = document.getElementById('modalQty');
            let current = parseInt(qtyInput.value);
            current += val;
            if (current < 1) current = 1;
            qtyInput.value = current;
        }

        function submitAddToCart() {
            if (!activeMenuItemId) return;

            const qty = document.getElementById('modalQty').value;
            const note = document.getElementById('modalNote').value;

            const submitBtn = document.getElementById('modalSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Xử lý...';

            const params = new URLSearchParams();
            params.append('menuItemId', activeMenuItemId);
            params.append('quantity', qty);
            params.append('note', note);

            fetch('/user/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(res => res.json())
            .then(data => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> Xác nhận';
                closeAddToCartModal();

                if (data.success) {
                    showToast(data.message, 'success');
                } else {
                    showToast(data.message, 'error');
                }
            })
            .catch(err => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> Xác nhận';
                closeAddToCartModal();
                showToast('Kết nối thất bại!', 'error');
            });
        }
    </script>
</body>
</html>
