<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{base :: header('Gọi món - Bàn ' + ${table.tableNumber})}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav th:replace="~{base :: navbar}"></nav>

    <!-- Main Container -->
    <div class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row gap-6">
        
        <!-- Left Side: Menu Items (2/3 width) -->
        <div class="flex-1 flex flex-col gap-6">
            
            <!-- Category and Filter Bar -->
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4">
                <!-- Search Input -->
                <div class="relative w-full sm:w-72">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" oninput="filterMenu()"
                           class="pl-10 block w-full rounded-xl border border-gray-200 py-2.5 px-3 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all"
                           placeholder="Tìm kiếm món ăn (gõ tắt)...">
                </div>

                <!-- Categories -->
                <div class="flex gap-1.5 overflow-x-auto w-full sm:w-auto scrollbar-none pb-1 sm:pb-0">
                    <button onclick="filterCategory('ALL')" id="catBtn-ALL" class="cat-btn bg-orange-500 text-white font-semibold px-4 py-2 rounded-xl text-sm transition-all">
                        Tất cả
                    </button>
                    <button th:each="cat : ${T(com.attraction.quanlinhahang.model.MenuItem.Category).values()}" 
                            th:data-cat="${cat.name()}"
                            onclick="filterCategory(this.getAttribute('data-cat'))"
                            th:id="'catBtn-' + ${cat.name()}"
                            class="cat-btn bg-slate-100 hover:bg-slate-200 text-gray-600 font-semibold px-4 py-2 rounded-xl text-sm transition-all"
                            th:text="${
                                cat.name() == 'APPETIZER' ? 'Khai vị' : 
                                (cat.name() == 'MAIN' ? 'Món chính' : 
                                (cat.name() == 'DRINK' ? 'Đồ uống' : 'Tráng miệng'))
                            }"></button>
                </div>
            </div>

            <!-- Menu Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="menuGrid">
                <div th:each="item : ${menuItems}" 
                     th:data-category="${item.category.name()}"
                     th:data-name="${item.name}"
                     class="menu-item-card bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden flex flex-col justify-between group hover:shadow-md transition-shadow">
                    
                    <!-- Image Area -->
                    <div class="relative h-44 w-full bg-slate-100 overflow-hidden border-b border-gray-50">
                        <img th:src="${item.imageUrl != null && item.imageUrl != '' ? item.imageUrl : 'https://placehold.co/600x400?text=Food'}" 
                             th:alt="${item.name}"
                             onerror="this.src='https://placehold.co/600x400?text=No+Image+Available'"
                             class="h-full w-full object-cover group-hover:scale-105 transition-transform duration-300">
                    </div>

                    <div class="p-5">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-extrabold uppercase tracking-wider text-orange-500 bg-orange-50 px-2.5 py-1 rounded-md"
                                      th:text="${
                                          item.category.name() == 'APPETIZER' ? 'Khai vị' : 
                                          (item.category.name() == 'MAIN' ? 'Món chính' : 
                                          (item.category.name() == 'DRINK' ? 'Đồ uống' : 'Tráng miệng'))
                                      }"></span>
                                <h3 class="text-lg font-bold text-gray-800 mt-2" th:text="${item.name}"></h3>
                            </div>
                            <span class="text-base font-extrabold text-orange-600" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <p class="text-xs text-gray-400 mt-2 line-clamp-2" th:text="${item.description}"></p>
                    </div>

                    <!-- Card Footer (Add Action) -->
                    <div class="p-5 pt-0">
                        <button th:if="${item.status.name() == 'AVAILABLE'}"
                                th:attr="data-id=${item.id},data-name=${item.name},data-price=${item.price}"
                                onclick="handleAddToCartClick(event)"
                                class="w-full bg-slate-100 hover:bg-orange-500 hover:text-white text-gray-700 font-bold py-2.5 rounded-xl text-xs transition-all duration-150 flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-plus text-xs"></i> Thêm món
                        </button>
                        <button th:if="${item.status.name() == 'OUT_OF_STOCK'}" disabled
                                class="w-full bg-gray-100 text-gray-400 cursor-not-allowed font-bold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-ban"></i> Tạm hết món
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Right Side: Order Details / Cart (1/3 width) -->
        <div class="w-full md:w-96 flex flex-col gap-6">
            <!-- Basket Panel -->
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col h-[550px] justify-between">
                
                <div>
                    <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                        <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2">
                            <i class="fa-solid fa-receipt text-orange-500"></i> Giỏ món Bàn <span th:text="${table.tableNumber}"></span>
                        </h2>
                        <span class="text-xs bg-orange-100 text-orange-700 px-2.5 py-1 rounded-md font-bold"
                              th:text="${order != null ? 'HĐ #' + order.id : 'Mới'}"></span>
                    </div>

                    <!-- Display Items already sent to Kitchen -->
                    <div th:if="${not #lists.isEmpty(orderDetails)}" class="mt-4">
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2"><i class="fa-solid fa-kitchen-set mr-1"></i> Món đã gửi bếp:</h4>
                        <div class="max-h-56 overflow-y-auto space-y-2 border-b border-gray-100 pb-3">
                            <div th:each="det : ${orderDetails}" class="flex flex-col text-sm py-1.5 px-2 bg-slate-50 rounded-lg gap-1">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <span class="font-bold text-gray-800" th:text="${det.menuItem.name}"></span>
                                        <span class="text-xs text-gray-400 font-semibold block" th:if="${det.note != null && det.note != ''}" th:text="'Ghi chú: ' + ${det.note}"></span>
                                    </div>
                                    <div class="text-right">
                                        <span class="font-bold text-gray-600" th:text="'x' + ${det.quantity}"></span>
                                        <span class="block text-[10px] text-gray-400 font-bold" th:text="${#numbers.formatDecimal(det.unitPrice * det.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                    </div>
                                </div>
                                <div class="flex justify-between items-center mt-1 pt-1.5 border-t border-dashed border-gray-200">
                                    <!-- Status Badge -->
                                    <span class="text-[10px] font-extrabold uppercase px-2 py-0.5 rounded-md"
                                          th:classappend="${
                                              det.status.name() == 'PENDING' ? 'bg-blue-100 text-blue-700' :
                                              det.status.name() == 'COOKING' ? 'bg-amber-100 text-amber-700' :
                                              det.status.name() == 'READY' ? 'bg-emerald-100 text-emerald-700' :
                                              det.status.name() == 'SERVED' ? 'bg-gray-100 text-gray-500' : 'bg-rose-100 text-rose-700'
                                          }"
                                          th:text="${
                                              det.status.name() == 'PENDING' ? 'Chờ bếp' :
                                              det.status.name() == 'COOKING' ? 'Đang nấu' :
                                              det.status.name() == 'READY' ? 'Nấu xong' :
                                              det.status.name() == 'SERVED' ? 'Đã phục vụ' : 'Đã hủy'
                                          }"></span>
                                    
                                    <!-- Serve button when READY -->
                                    <form th:if="${det.status.name() == 'READY'}" th:action="@{/order/detail/update-status}" method="POST" class="inline">
                                        <input type="hidden" name="detailId" th:value="${det.id}">
                                        <input type="hidden" name="status" value="SERVED">
                                        <input type="hidden" name="tableNumber" th:value="${table.tableNumber}">
                                        <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 transition-colors">
                                            <i class="fa-solid fa-bell-concierge"></i> Phục vụ
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Editable Cart / Live Items -->
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wide mt-4 mb-2"><i class="fa-solid fa-cart-shopping mr-1"></i> Món đang chọn (chưa gửi):</h4>
                    <div id="cartItemsContainer" class="flex-1 overflow-y-auto h-48 space-y-3 pr-1 scrollbar-none">
                        <!-- Empty Message -->
                        <div id="emptyCartMessage" class="text-center py-8 text-gray-400 text-sm flex flex-col items-center justify-center gap-2">
                            <i class="fa-solid fa-basket-shopping text-3xl"></i>
                            Chưa có món mới nào được chọn
                        </div>
                        <!-- Items Sub-container -->
                        <div id="cartItemsList" class="space-y-3"></div>
                    </div>
                </div>

                <!-- Footer Summary & Checkout Actions -->
                <div class="border-t border-gray-100 pt-4 mt-4">
                    <div class="flex justify-between items-center text-sm font-bold text-gray-700 mb-4">
                        <span>Tổng tiền tạm tính:</span>
                        <span id="cartTotalText" class="text-lg font-extrabold text-orange-600">0 đ</span>
                    </div>

                    <button onclick="submitOrder()" id="btnSubmitOrder" disabled
                            class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-200 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> Gửi bếp chế biến (KOT)
                    </button>
                    <a href="/tables" class="block w-full text-center mt-2 bg-slate-100 hover:bg-slate-200 text-gray-700 font-bold py-2.5 rounded-xl text-xs transition-colors duration-150">
                        Quay lại Sơ đồ bàn
                    </a>
                </div>

            </div>
        </div>

    </div>

    <!-- Script Operations for Ordering -->
    <script th:inline="javascript">
        // Cart map
        let cart = {};
        const tableNumber = [[${table.tableNumber}]];

        function handleAddToCartClick(event) {
            const btn = event.currentTarget;
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const price = parseFloat(btn.getAttribute('data-price'));
            addToCart(id, name, price);
        }

        function addToCart(id, name, price) {
            if (cart[id]) {
                cart[id].quantity += 1;
            } else {
                cart[id] = {
                    id: id,
                    name: name,
                    price: price,
                    quantity: 1,
                    note: ""
                };
            }
            renderCart();
        }

        function changeQty(id, delta) {
            if (!cart[id]) return;
            cart[id].quantity += delta;
            if (cart[id].quantity <= 0) {
                delete cart[id];
            }
            renderCart();
        }

        function updateNote(id, noteValue) {
            if (!cart[id]) return;
            cart[id].note = noteValue;
        }

        function renderCart() {
            const listContainer = document.getElementById('cartItemsList');
            listContainer.innerHTML = "";
 
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                document.getElementById('emptyCartMessage').classList.remove('hidden');
                document.getElementById('cartTotalText').innerText = "0 đ";
                document.getElementById('btnSubmitOrder').disabled = true;
                return;
            }
 
            document.getElementById('emptyCartMessage').classList.add('hidden');
            let total = 0;
 
            keys.forEach(id => {
                const item = cart[id];
                total += item.price * item.quantity;
 
                const itemDiv = document.createElement('div');
                itemDiv.className = "bg-orange-50/40 border border-orange-100/60 rounded-xl p-3.5 space-y-2";
                itemDiv.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-gray-800 text-sm">${item.name}</span>
                        <span class="font-extrabold text-orange-600 text-sm">${(item.price * item.quantity).toLocaleString('vi-VN')} đ</span>
                    </div>
                    <div class="flex justify-between items-center gap-2">
                        <input type="text" placeholder="Ghi chú chế biến..." 
                               oninput="updateNote(${item.id}, this.value)" 
                               value="${item.note}"
                               class="flex-1 bg-white border border-gray-100 rounded-lg py-1 px-2.5 text-xs outline-none focus:border-orange-400">
                        <div class="flex items-center gap-2.5 bg-white border border-gray-100 px-2 py-1 rounded-lg">
                            <button onclick="changeQty(${item.id}, -1)" class="text-orange-500 hover:text-orange-600 font-black text-xs px-1"><i class="fa-solid fa-minus"></i></button>
                            <span class="font-bold text-gray-700 text-sm">${item.quantity}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="text-orange-500 hover:text-orange-600 font-black text-xs px-1"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
 
            document.getElementById('cartTotalText').innerText = total.toLocaleString('vi-VN') + " đ";
            document.getElementById('btnSubmitOrder').disabled = false;
        }

        function submitOrder() {
            const btn = document.getElementById('btnSubmitOrder');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Đang gửi...`;

            // Prepare payloads
            const items = {};
            const notes = {};
            Object.keys(cart).forEach(id => {
                items[id] = cart[id].quantity;
                notes[id] = cart[id].note;
            });

            fetch(`/order/${tableNumber}/add`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    items: items,
                    notes: notes
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.customAlert('Thành công', data.message, 'success', function() {
                        location.reload();
                    });
                } else {
                    window.customAlert('Lỗi', data.message, 'danger');
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Gửi bếp chế biến (KOT)`;
                }
            })
            .catch(err => {
                window.customAlert('Lỗi kết nối', "Lỗi kết nối máy chủ!", 'danger');
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Gửi bếp chế biến (KOT)`;
            });
        }

        // Category filter
        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn bg-slate-100 hover:bg-slate-200 text-gray-600 font-semibold px-4 py-2 rounded-xl text-sm transition-all";
            });
            document.getElementById('catBtn-' + cat).className = "cat-btn bg-orange-500 text-white font-semibold px-4 py-2 rounded-xl text-sm transition-all";

            document.querySelectorAll('.menu-item-card').forEach(card => {
                const itemCat = card.getAttribute('data-category');
                if (cat === 'ALL' || itemCat === cat) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
            filterMenu(); // Re-apply search query filter
        }

        // Search filter
        function filterMenu() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const activeCatBtn = document.querySelector('.cat-btn.bg-orange-500');
            const activeCat = activeCatBtn.id.replace('catBtn-', '');

            document.querySelectorAll('.menu-item-card').forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                const itemCat = card.getAttribute('data-category');
                
                const matchesSearch = name.includes(query) || getAcronym(name).includes(query);
                const matchesCat = activeCat === 'ALL' || itemCat === activeCat;

                if (matchesSearch && matchesCat) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        // Search acronym generator (e.g. "Lẩu Thái" -> "lt")
        function getAcronym(str) {
            return str.split(" ")
                      .map(w => w.charAt(0))
                      .join("")
                      .toLowerCase();
        }
    </script>

</body>
</html>
