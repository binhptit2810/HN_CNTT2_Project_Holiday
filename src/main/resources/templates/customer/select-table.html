<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{base :: header('Chọn Bàn Đặt Món')}"></head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-rose-100 min-h-screen flex flex-col font-sans">

    <!-- Header / Navbar -->
    <nav th:replace="~{base :: navbar}"></nav>

    <!-- Content Container -->
    <div class="flex-1 max-w-4xl mx-auto w-full px-4 py-8 flex flex-col gap-6">
        <div class="text-center">
            <h1 class="text-3xl font-black tracking-tight text-gray-900">Chào mừng bạn đến với Nhà hàng!</h1>
            <p class="text-sm text-gray-500 mt-2">Vui lòng chọn số bàn bạn đang ngồi để bắt đầu gọi món trực tiếp xuống bếp (không cần phục vụ duyệt).</p>
        </div>

        <!-- Tables Grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 mt-4">
            <th:block th:each="table : ${tables}" th:with="isLocked=${table.status.name() == 'OCCUPIED' && (table.currentCustomer == null || table.currentCustomer.id != user.id)}">
                
                <!-- Unlocked Table -->
                <a th:if="${!isLocked}"
                   th:href="@{/customer/order/{num}(num=${table.tableNumber})}"
                   class="bg-white border rounded-3xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm hover:shadow-md hover:scale-105 transition-all duration-200 group"
                   th:classappend="${
                       table.status.name() == 'EMPTY' ? 'border-emerald-200 bg-emerald-50/10' : 
                       (table.status.name() == 'OCCUPIED' ? 'border-blue-200 bg-blue-50/10' : 'border-amber-200 bg-amber-50/10')
                   }">
                    
                    <!-- Table Number Icon -->
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-black transition-colors"
                         th:classappend="${
                             table.status.name() == 'EMPTY' ? 'bg-emerald-100 text-emerald-700' : 
                             (table.status.name() == 'OCCUPIED' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700')
                         }">
                        <i class="fa-solid fa-chair"></i>
                    </div>

                    <!-- Table details -->
                    <div class="text-center">
                        <span class="text-lg font-black text-gray-800 group-hover:text-orange-500 transition-colors" th:text="'Bàn ' + ${table.tableNumber}"></span>
                        <span class="block text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-0.5" th:text="'Sức chứa: ' + ${table.capacity} + ' người'"></span>
                    </div>

                    <!-- Status Badge -->
                    <span class="text-[10px] font-extrabold uppercase px-2.5 py-1 rounded-md"
                          th:classappend="${
                              table.status.name() == 'EMPTY' ? 'bg-emerald-50 text-emerald-700' : 
                              (table.status.name() == 'OCCUPIED' ? 'bg-blue-50 text-blue-700' : 'bg-amber-50 text-amber-700')
                          }"
                          th:text="${
                              table.status.name() == 'EMPTY' ? 'Bàn trống' : 
                              (table.status.name() == 'OCCUPIED' ? 'Đang dùng' : 'Đã đặt trước')
                          }"></span>
                </a>

                <!-- Locked Table -->
                <div th:if="${isLocked}"
                   class="bg-gray-50 border border-gray-200 rounded-3xl p-6 flex flex-col items-center justify-center gap-3 shadow-sm opacity-60 cursor-not-allowed">
                    
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-black transition-colors bg-gray-200 text-gray-500">
                        <i class="fa-solid fa-lock"></i>
                    </div>

                    <div class="text-center">
                        <span class="text-lg font-black text-gray-600" th:text="'Bàn ' + ${table.tableNumber}"></span>
                        <span class="block text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-0.5" th:text="'Sức chứa: ' + ${table.capacity} + ' người'"></span>
                    </div>

                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-extrabold uppercase px-2.5 py-1 rounded-md bg-gray-200 text-gray-600">Đang sử dụng</span>
                        <span class="text-[10px] text-rose-500 font-bold mt-1" th:if="${table.currentCustomer != null}" th:text="'Bởi: ' + ${table.currentCustomer.username}"></span>
                        <span class="text-[10px] text-rose-500 font-bold mt-1" th:if="${table.currentCustomer == null}">Khách tại quán</span>
                    </div>
                </div>
            </th:block>
        </div>
    </div>

</body>
</html>
