<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{base :: header('Lịch sử Hóa đơn')}"></head>
<body class="bg-slate-50 min-h-screen">

    <nav th:replace="~{base :: navbar}"></nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Alerts Block -->
        <div th:if="${success != null}" class="mb-6 bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg flex items-center gap-3">
            <i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>
            <span class="text-sm font-semibold text-emerald-800" th:text="${success}"></span>
        </div>
        <div th:if="${error != null}" class="mb-6 bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-lg flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation text-rose-500 text-lg"></i>
            <span class="text-sm font-semibold text-rose-800" th:text="${error}"></span>
        </div>

        <!-- Title -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Lịch sử Hóa đơn</h1>
                <p class="text-sm text-gray-500 mt-1">Danh sách toàn bộ hóa đơn đã được thanh toán.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: Bills Table (2/3 width) -->
            <div class="lg:col-span-2 bg-white rounded-2xl border border-gray-100 p-6 shadow-sm">
                <h2 class="text-lg font-extrabold text-gray-900 mb-4 flex items-center gap-2"><i class="fa-solid fa-file-invoice-dollar text-orange-500"></i> Danh sách Hóa đơn</h2>
                
                <div class="overflow-x-auto">
                    <table class="min-w-full text-sm text-left">
                        <thead>
                            <tr class="text-xs uppercase font-extrabold text-gray-400 border-b border-gray-100 bg-gray-50/50">
                                <th class="px-4 py-3">Mã HĐ</th>
                                <th class="px-4 py-3 text-center">Bàn</th>
                                <th class="px-4 py-3 text-right">Tổng thanh toán</th>
                                <th class="px-4 py-3 text-center">PT Thanh toán</th>
                                <th class="px-4 py-3 text-center">Thời gian</th>
                                <th class="px-4 py-3 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr th:each="bill : ${bills}" class="hover:bg-slate-50/50">
                                <td class="px-4 py-3">
                                    <span class="font-bold text-gray-800 block" th:text="'#' + ${bill.id}"></span>
                                </td>
                                <td class="px-4 py-3 text-center">
                                    <span class="font-bold text-gray-800" th:text="${bill.order.tableNumber}"></span>
                                </td>
                                <td class="px-4 py-3 text-right font-black text-orange-600" th:text="${#numbers.formatDecimal(bill.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                <td class="px-4 py-3 text-center">
                                    <span th:if="${bill.paymentMethod.name() == 'CASH'}" class="px-2 py-0.5 bg-green-100 text-green-700 font-bold text-[10px] rounded">TIỀN MẶT</span>
                                    <span th:if="${bill.paymentMethod.name() == 'BANKING'}" class="px-2 py-0.5 bg-blue-100 text-blue-700 font-bold text-[10px] rounded">CHUYỂN KHOẢN</span>
                                    <span th:if="${bill.paymentMethod.name() == 'CARD'}" class="px-2 py-0.5 bg-purple-100 text-purple-700 font-bold text-[10px] rounded">QUẸT THẺ</span>
                                </td>
                                <td class="px-4 py-3 text-center text-gray-500 font-semibold" th:text="${#temporals.format(bill.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="px-4 py-3 text-center">
                                    <button th:data-order-id="${bill.order.id}" 
                                            th:data-total="${bill.totalAmount}" 
                                            th:data-pm="${bill.paymentMethod.name()}"
                                            onclick="viewBillDetails(this.getAttribute('data-order-id'), this.getAttribute('data-total'), this.getAttribute('data-pm'))" 
                                            class="p-1.5 bg-slate-100 hover:bg-slate-200 text-gray-600 rounded-lg text-xs" title="Xem chi tiết">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Side: Details View -->
            <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm h-fit">
                <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2"><i class="fa-solid fa-receipt text-orange-500"></i> Chi tiết Hóa đơn</h3>
                
                <div id="emptyBillState" class="text-center py-8">
                    <div class="text-gray-300 mb-2"><i class="fa-solid fa-file-invoice text-4xl"></i></div>
                    <p class="text-sm text-gray-500">Chọn một hóa đơn để xem chi tiết</p>
                </div>

                <div id="billContent" class="hidden">
                    <div class="mb-4 pb-4 border-b border-gray-100 border-dashed">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs text-gray-500">PT Thanh toán:</span>
                            <span id="billMethod" class="text-xs font-bold text-gray-800"></span>
                        </div>
                    </div>
                    
                    <div class="max-h-[300px] overflow-y-auto mb-4 pr-1 text-sm">
                        <table class="w-full text-left">
                            <tbody id="billItemsTableBody" class="divide-y divide-gray-50 border-b border-gray-100 border-dashed pb-2 block">
                            </tbody>
                        </table>
                    </div>

                    <div class="flex justify-between items-center mt-4">
                        <span class="text-sm font-extrabold uppercase text-gray-500">TỔNG CỘNG</span>
                        <h2 id="billTotalText" class="text-xl font-black text-orange-600">0 đ</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function viewBillDetails(orderId, totalAmount, paymentMethod) {
            document.getElementById('emptyBillState').classList.add('hidden');
            document.getElementById('billContent').classList.remove('hidden');

            document.getElementById('billMethod').innerText = paymentMethod;
            document.getElementById('billTotalText').innerText = Number(totalAmount).toLocaleString('vi-VN') + ' đ';

            // Load via API (Same endpoint used by POS)
            fetch(`/admin/pos/order/${orderId}`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('billItemsTableBody');
                    tbody.innerHTML = "";
                    data.items.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.className = "flex justify-between py-1.5";
                        tr.innerHTML = `
                            <td class="w-1/2 font-semibold text-gray-800 truncate pr-2">${item.name}</td>
                            <td class="w-1/4 text-right text-gray-500">x${item.quantity}</td>
                            <td class="w-1/4 text-right font-bold text-gray-800">${item.total.toLocaleString('vi-VN')} đ</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    window.customAlert("Lỗi", "Không thể tải chi tiết hóa đơn", "danger");
                });
        }
    </script>
</body>
</html>
