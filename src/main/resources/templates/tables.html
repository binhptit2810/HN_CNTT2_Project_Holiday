<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{base :: header('Sơ đồ bàn')}"></head>
<body class="bg-slate-50 min-h-screen">

    <nav th:replace="~{base :: navbar}"></nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Title and Stats Bar -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Sơ đồ bàn & Đặt bàn</h1>
                <p class="text-sm text-gray-500 mt-1">Cập nhật trạng thái và điều phối bàn ăn theo thời gian thực.</p>
            </div>
            
            <!-- Status Guide Legend -->
            <div class="flex items-center gap-4 bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 text-sm">
                <span class="flex items-center gap-1.5 font-semibold text-gray-600">
                    <span class="w-3 h-3 rounded-full bg-emerald-500"></span> Trống
                </span>
                <span class="flex items-center gap-1.5 font-semibold text-gray-600">
                    <span class="w-3 h-3 rounded-full bg-rose-500"></span> Đang có khách
                </span>
                <span class="flex items-center gap-1.5 font-semibold text-gray-600">
                    <span class="w-3 h-3 rounded-full bg-amber-400"></span> Đặt trước
                </span>
            </div>
        </div>

        <!-- Warning Toast for Errors -->
        <div th:if="${error != null}" class="mb-6 bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg flex items-center gap-3">
            <i class="fa-solid fa-triangle-exclamation text-amber-500 text-lg"></i>
            <span class="text-sm font-semibold text-amber-800" th:text="${error}"></span>
        </div>

        <!-- Success Toast for Messages -->
        <div th:if="${success != null}" class="mb-6 bg-green-50 border-l-4 border-green-500 p-4 rounded-r-lg flex items-center gap-3">
            <i class="fa-solid fa-circle-check text-green-500 text-lg"></i>
            <span class="text-sm font-semibold text-green-800" th:text="${success}"></span>
        </div>

        <!-- Ready Items to Serve Panel -->
        <div th:if="${not #lists.isEmpty(readyDetails)}" class="mb-8 bg-white rounded-2xl border border-emerald-100 shadow-sm p-6">
            <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2 mb-4">
                <i class="fa-solid fa-bell-concierge text-emerald-500 animate-bounce"></i> Món ăn đã nấu xong - Chờ bưng lên bàn
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="det : ${readyDetails}" class="bg-emerald-50/20 border border-emerald-100/50 rounded-xl p-4 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center pb-2 border-b border-emerald-100 mb-2">
                            <span class="font-black text-slate-800" th:text="'Bàn ' + ${det.order.tableNumber}"></span>
                            <span class="text-[10px] text-emerald-600 font-extrabold uppercase bg-emerald-50 px-2 py-0.5 rounded">Nấu xong</span>
                        </div>
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-gray-800" th:text="${det.menuItem.name}"></h4>
                                <p class="text-xs text-gray-400 font-semibold mt-1" th:if="${det.note != null && !det.note.isEmpty()}" th:text="'Ghi chú: ' + ${det.note}"></p>
                            </div>
                            <span class="font-black text-gray-700 bg-white shadow-sm border border-gray-100 px-2.5 py-1 rounded-md text-xs" th:text="'x' + ${det.quantity}"></span>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-emerald-100/40">
                        <form th:action="@{/tables/detail/serve}" method="POST">
                            <input type="hidden" name="detailId" th:value="${det.id}">
                            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded-lg text-xs transition-colors flex items-center justify-center gap-1.5 shadow-sm">
                                <i class="fa-solid fa-circle-check"></i> Xác nhận đã phục vụ
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pending QR Requests Panel -->
        <div th:if="${not #lists.isEmpty(pendingRequests)}" class="mb-8 bg-white rounded-2xl border border-orange-100 shadow-sm p-6">
            <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2 mb-4">
                <i class="fa-solid fa-bell text-orange-500 animate-bounce"></i> Yêu cầu gọi món QR chờ duyệt
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="req : ${pendingRequests}" class="bg-orange-50/30 border border-orange-100/50 rounded-xl p-4 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-center pb-2 border-b border-orange-100 mb-2">
                            <span class="font-bold text-slate-800" th:text="'Bàn ' + ${req.tableNumber}"></span>
                            <span class="text-[10px] text-gray-400 font-medium" th:text="${#temporals.format(req.createdAt, 'HH:mm')}"></span>
                        </div>
                        <ul class="text-xs text-gray-700 space-y-1">
                            <li th:each="detail : ${requestDetailsMap.get(req.id)}">
                                <span class="font-bold" th:text="'- ' + ${detail.menuItem.name} + ' (x' + ${detail.quantity} + ')'"></span>
                                <span th:if="${detail.note != null && !detail.note.isEmpty()}" class="text-red-500 italic" th:text="' - ' + ${detail.note}"></span>
                            </li>
                        </ul>
                    </div>
                    <div class="flex gap-2 mt-4 pt-3 border-t border-orange-100/40">
                        <form th:action="@{/tables/requests/{id}/reject(id=${req.id})}" method="POST" class="flex-1">
                            <button type="submit" class="w-full bg-slate-100 hover:bg-slate-200 text-gray-600 font-bold py-2 rounded-lg text-xs transition-colors">
                                Từ chối
                            </button>
                        </form>
                        <form th:action="@{/tables/requests/{id}/approve(id=${req.id})}" method="POST" class="flex-1">
                            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded-lg text-xs transition-colors">
                                Phê duyệt
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table Grid layout -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <div th:each="table : ${tables}" 
                 class="bg-white rounded-2xl border shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 overflow-hidden flex flex-col justify-between h-48"
                 th:classappend="${table.paymentRequested != null && table.paymentRequested ? 'border-rose-500 ring-2 ring-rose-500/30' : 'border-gray-100'}">
                
                <!-- Card Header with status color strip -->
                <div class="h-2" th:classappend="${
                    table.paymentRequested != null && table.paymentRequested ? 'bg-rose-500 animate-pulse' :
                    (table.status.name() == 'EMPTY' ? 'bg-emerald-500' : 
                    (table.status.name() == 'OCCUPIED' ? 'bg-rose-500' : 'bg-amber-400'))
                }"></div>
                
                <!-- Table Details -->
                <div class="p-5 flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start">
                            <h3 class="text-xl font-bold text-gray-800" th:text="'Bàn ' + ${table.tableNumber}"></h3>
                            <span class="text-xs font-extrabold text-gray-400 uppercase tracking-wide bg-gray-50 px-2.5 py-1 rounded-md">
                                <i class="fa-solid fa-users mr-1"></i> <span th:text="${table.capacity}"></span> chỗ
                            </span>
                        </div>
                        <p class="text-xs font-semibold mt-1 flex items-center gap-1" 
                           th:classappend="${
                               table.paymentRequested != null && table.paymentRequested ? 'text-rose-600 animate-bounce' :
                               (table.status.name() == 'EMPTY' ? 'text-emerald-600' : 
                               (table.status.name() == 'OCCUPIED' ? 'text-rose-600' : 'text-amber-600'))
                           }">
                            <i class="fa-solid fa-bell text-rose-500 animate-swing" th:if="${table.paymentRequested != null && table.paymentRequested}"></i>
                            <span th:text="${
                                table.paymentRequested != null && table.paymentRequested ? 'Khách gọi thanh toán!' :
                                (table.status.name() == 'EMPTY' ? 'Đang trống' : 
                                (table.status.name() == 'OCCUPIED' ? 'Đang có khách' : 'Đã đặt trước'))
                            }"></span>
                        </p>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex flex-col gap-1.5 mt-4">
                        <!-- EMPTY Status Actions -->
                        <div th:if="${table.status.name() == 'EMPTY'}" class="flex gap-1">
                            <button th:data-table-number="${table.tableNumber}"
                                    onclick="openOpenModal(this.getAttribute('data-table-number'))" 
                                    class="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold py-2 rounded-lg text-xs transition-colors duration-150 text-center">
                                <i class="fa-solid fa-door-open mr-1"></i> Mở bàn
                            </button>
                            <form th:action="@{/tables/reserve}" method="POST" class="flex-1">
                                <input type="hidden" name="tableNumber" th:value="${table.tableNumber}">
                                <button type="submit" 
                                        class="w-full bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold py-2 rounded-lg text-xs transition-colors duration-150 text-center">
                                    <i class="fa-solid fa-bookmark mr-1"></i> Đặt trước
                                </button>
                            </form>
                        </div>

                        <!-- OCCUPIED Status Actions -->
                        <div th:if="${table.status.name() == 'OCCUPIED'}" class="flex gap-1">
                            <a th:href="@{/order/{num}(num=${table.tableNumber})}" 
                               class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-2 rounded-lg text-xs transition-colors duration-150 text-center">
                                <i class="fa-solid fa-receipt mr-1"></i> Gọi món
                            </a>
                            <form th:if="${tableHasItemsMap == null || tableHasItemsMap[table.tableNumber] == null || !tableHasItemsMap[table.tableNumber]}"
                                  th:action="@{/tables/clear}" method="POST" class="flex-1"
                                  th:id="'form-clear-' + ${table.tableNumber}"
                                  th:data-table-number="${table.tableNumber}"
                                  onsubmit="return handleClearTable(event, this.getAttribute('data-table-number'))">
                                <input type="hidden" name="tableNumber" th:value="${table.tableNumber}">
                                <button type="submit" 
                                        class="w-full bg-slate-100 hover:bg-slate-200 text-gray-700 font-bold py-2 rounded-lg text-xs transition-colors duration-150 text-center">
                                    <i class="fa-solid fa-broom mr-1"></i> Dọn bàn
                                </button>
                            </form>
                        </div>

                        <!-- RESERVED Status Actions -->
                        <div th:if="${table.status.name() == 'RESERVED'}" class="flex gap-1">
                            <button th:data-table-number="${table.tableNumber}"
                                    onclick="openOpenModal(this.getAttribute('data-table-number'))"
                                    class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-lg text-xs transition-colors duration-150 text-center">
                                <i class="fa-solid fa-circle-check mr-1"></i> Nhận bàn
                            </button>
                            <form th:action="@{/tables/clear}" method="POST" class="flex-1">
                                <input type="hidden" name="tableNumber" th:value="${table.tableNumber}">
                                <button type="submit" 
                                        class="w-full bg-slate-100 hover:bg-slate-200 text-gray-700 font-bold py-2 rounded-lg text-xs transition-colors duration-150 text-center">
                                    <i class="fa-solid fa-xmark mr-1"></i> Hủy đặt
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Open Table Modal -->
    <div id="openTableModal" class="fixed inset-0 z-50 overflow-y-auto hidden">
        <div class="flex items-center justify-center min-h-screen p-4 text-center">
            <!-- Overlay background -->
            <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeOpenModal()"></div>

            <div class="relative bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 text-left border border-slate-100 transform transition-all duration-300">
                <h3 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-door-open text-emerald-500"></i> Mở Bàn Ăn <span id="modalTableLabel" class="text-orange-500"></span>
                </h3>
                <form th:action="@{/tables/open}" method="POST" class="space-y-4">
                    <input type="hidden" id="modalTableNumberInput" name="tableNumber">
                    <div>
                        <label for="numGuests" class="block text-sm font-semibold text-gray-700 mb-1">Số lượng khách ăn</label>
                        <input type="number" id="numGuests" name="numGuests" required min="1" value="2"
                               class="block w-full rounded-xl border border-gray-200 py-3 px-4 text-sm outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all">
                        <p class="text-xs text-gray-400 mt-1.5"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Số lượng khách không vượt quá 1.5 lần sức chứa tiêu chuẩn của bàn.</p>
                    </div>
                    <div class="flex justify-end gap-2 pt-2">
                        <button type="button" onclick="closeOpenModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-lg text-sm font-semibold transition-colors">
                            Hủy bỏ
                        </button>
                        <button type="submit" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-semibold transition-colors">
                            Xác nhận mở
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openOpenModal(tableNumber) {
            document.getElementById('modalTableLabel').innerText = '#' + tableNumber;
            document.getElementById('modalTableNumberInput').value = tableNumber;
            document.getElementById('openTableModal').classList.remove('hidden');
        }

        function closeOpenModal() {
            document.getElementById('openTableModal').classList.add('hidden');
        }

        function handleClearTable(event, tableNumber) {
            event.preventDefault();
            const form = document.getElementById('form-clear-' + tableNumber);
            window.customConfirm(
                "Dọn dẹp bàn ăn",
                "Bạn có chắc chắn muốn dọn bàn này và giải phóng đơn hàng liên quan không?",
                function() {
                    form.submit();
                },
                null,
                'danger'
            );
            return false;
        }
    </script>

</body>
</html>
